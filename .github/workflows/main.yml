name: CI
on:
  workflow_dispatch:

jobs:
  ci-test:
    name: Build Kernel
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Kernel
        uses: ./
        with:
          kernel-url: https://github.com/khangsv23/android_kernel_xiaomi_vayu
          # QUAN TRỌNG: Để trống kernel-dir để script tìm Makefile ở thư mục gốc
          kernel-dir: 
          kernel-branch: misc
          config: vayu_user_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          ksu-version: main
          android-version: 12
          aosp-clang-version: r383902
          disable-lto: true
          anykernel3: true
