name: Build KernelSU Next Vayu
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LuffyTaro008/android_kernel_xiaomi_vayu
          kernel-branch: 13
          config: vayu_defconfig
          arch: arm64
          android-version: 13
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/tiann/KernelSU # Hoặc link repo KSU Next cụ thể bạn muốn
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
