name: Build KernelSU Next Vayu
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LuffyTaro008/android_kernel_xiaomi_vayu
          kernel-branch: 13
          config: vayu_defconfig
          arch: arm64
          android-version: 11
          aosp-clang: true
          aosp-gcc: true
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "KCFLAGS=-w"]'
          ksu: true
          # TẠM THỜI TẮT ksu-other ĐỂ KIỂM TRA
          ksu-other: false 
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
